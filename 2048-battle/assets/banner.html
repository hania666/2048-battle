<!DOCTYPE html>
<html>
<head>
<style>
* { margin: 0; padding: 0; }
body { width: 1024px; height: 500px; overflow: hidden; }
.banner {
  width: 1024px; height: 500px;
  background: #0F0E17;
  display: flex; align-items: center;
  font-family: Georgia, serif;
}
.left {
  width: 420px; padding: 40px;
  display: flex; flex-direction: column; gap: 20px;
}
.tile-grid {
  display: grid; grid-template-columns: 1fr 1fr;
  gap: 8px; width: 200px;
}
.tile {
  width: 96px; height: 96px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 48px; font-weight: 900; color: white;
}
.t2048 { background: #F65E3B; }
.t4 { background: #EAB84A; color: #7A5200; }
.t8 { background: #4CAF82; }
.t16 { background: #378ADD; }
.title { font-size: 64px; font-weight: 900; color: white; }
.title span { color: #F65E3B; }
.subtitle { font-size: 16px; color: #888; letter-spacing: 3px; }
.right {
  flex: 1; padding: 40px;
  border-left: 1px solid #222;
  display: flex; flex-direction: column; gap: 24px;
}
.feature { display: flex; align-items: center; gap: 16px; }
.feat-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px;
}
.feat-title { font-size: 18px; font-weight: 700; color: white; }
.feat-desc { font-size: 13px; color: #666; margin-top: 2px; }
.divider { border: none; border-top: 1px solid #1a1a2e; }
</style>
</head>
<body>
<div class="banner">
  <div class="left">
    <div class="tile-grid">
      <div class="tile t2048">20</div>
      <div class="tile t4">48</div>
      <div class="tile t8">8</div>
      <div class="tile t16">16</div>
    </div>
    <div>
      <div class="title"><span>2048</span> BATTLE</div>
      <div class="subtitle">REAL-TIME PvP PUZZLE</div>
    </div>
  </div>
  <div class="right">
    <div class="feature">
      <div class="feat-icon" style="background:#1a2a3a">⚔️</div>
      <div>
        <div class="feat-title">Real-time PvP</div>
        <div class="feat-desc">Challenge players worldwide</div>
      </div>
    </div>
    <hr class="divider">
    <div class="feature">
      <div class="feat-icon" style="background:#2a1a1a">🏆</div>
      <div>
        <div class="feat-title">ELO Rankings</div>
        <div class="feat-desc">Climb the global leaderboard</div>
      </div>
    </div>
    <hr class="divider">
    <div class="feature">
      <div class="feat-icon" style="background:#1a2a1a">🤖</div>
      <div>
        <div class="feat-title">Bot Battles</div>
        <div class="feat-desc">Easy, Medium & Hard AI</div>
      </div>
    </div>
    <hr class="divider">
    <div class="feature">
      <div class="feat-icon" style="background:#1a1a2a">🎨</div>
      <div>
        <div class="feat-title">Unique Skins</div>
        <div class="feat-desc">Unlock exclusive tile designs</div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
